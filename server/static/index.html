<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>
    <!-- Контейнер для входа -->
    <div class="login-container" id="loginContainer">
        <h2>Вход</h2>
        <form id="loginForm">
            <input type="text" id="login" placeholder="Логин или Email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
            <p>Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрироваться</a></p>
        </form>
        <div id="message"></div>
    </div>

    <!-- Контейнер для привязки роли (изначально скрыт) -->
    <div class="login-container" id="bindRoleContainer">
        <h2>Привязка роли</h2>
        <p>Для доступа необходима роль. Введите код, полученный от администратора:</p>
        <form id="bindRoleForm">
            <input type="text" id="rolePassword" placeholder="Код роли" required>
            <button type="submit">Привязать</button>
        </form>
        <div id="bindMessage"></div>
        <div class="link">
            <a href="#" id="backToLogin">← Назад к входу</a>
        </div>
    </div>

    <script src="dist/auth.js"></script>
</body>

</html>
